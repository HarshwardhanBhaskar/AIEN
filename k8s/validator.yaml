apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: validator
spec:
  serviceName: "validator"
  replicas: 1
  selector:
    matchLabels:
      app: validator
  template:
    metadata:
      labels:
        app: validator
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z nats 4222; do echo waiting for nats; sleep 2; done']
      containers:
        - name: validator
          image: aien-validator:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres:5432/aien?sslmode=disable"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: LEDGER_PATH
              value: "/app/data/ledger.log"
          ports:
            - containerPort: 8086
              name: metrics
          volumeMounts:
            - name: ledger-storage
              mountPath: /app/data
  volumeClaimTemplates:
    - metadata:
        name: ledger-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: validator
spec:
  ports:
    - port: 8086
      name: metrics
      targetPort: 8086
  selector:
    app: validator
